<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="../asset/seal.png">
  <title>Admin Login - Kipoint</title>
  <link rel="stylesheet" href="../main.css">
  <script src="../jquery.js"></script>
  <script src="login.js"></script>
  <script src="../plugins/sweetalert2@11.js"></script>
</head>
<body>
  <style>
    .login {
      width: 25vw;
      display: flex;
      flex-direction: column;
      padding-top: 5rem;
    }

    .login > img {
      width: 40%;
      height: auto;
      object-fit: cover;
      align-self: center;
    }
  </style>

  <div class="backdrop">
    <span class="loader"></span>
  </div>

  <div class="container-fluid d-flex flex-column align-items-center">
    <div class="login">
      <img src="../asset/seal.png" class="mb-4">
      <h4 class="is-size-4 mt-4 mb-4">Admin Login</h4>
      <form id="loginForm">
        <input required type="text" class="input mb-3" placeholder="Username" id="username">
        <input required type="password" class="input mb-3" id="password" placeholder="Password">
        <button type='submit' class="button is-primary w-100">LOGIN</button>
      </form>
    </div>
  </div>
</body>
</html>
