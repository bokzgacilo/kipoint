<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Kipoint</title>
  <link rel="icon" type="image/x-icon" href="asset/seal.png">
  <link rel="stylesheet" href="index.css">
  <script src="jquery.js"></script>
  <script src="plugins/formToJson.js"></script>
  <script src="//cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <style>
    .register-form {
      width: 40vw;
      margin-top: 5rem;
      display: flex;
      flex-direction: column;
    }

    h4 {
      font-family: Inter-Bold;
    }

    .backdrop {
      background-color: var(--backdrop);
      width: 100vw;
      height: 100vh;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1;
      position: fixed; 
    }

    label {
      font-family: Inter-SemiBold;
    }
    
    #usernameFeedback, #passwordFeedback {
      display: none;
      font-family: Inter-Medium;
    }
  </style>

  <div class="modal fade" id="alertmodal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="exampleModalLabel">Alert</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          Username and password is incorrect
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Ok</button>
        </div>
      </div>
    </div>
  </div>

  <div class="container-fluid d-flex flex-column align-items-center">
    <div class="backdrop">
      <div class="spinner-border text-light" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

  
    <div class="register-form">
      <h4 class="mb-4">Register</h4>
      <form id="register-form">
        <div class="mb-2">
          <label for="exampleFormControlInput1" class="form-label">Fullname (Surname, Given Name)</label>
          <input required type="text" class="form-control" placeholder="Dela Cruz, Juan" id="fullname-register" placeholder="Username">
        </div>
        <hr>
        <div class="mb-2">
          <label for="exampleFormControlInput1" class="form-label">Username</label>
          <input required type="text" class="form-control" id="username-register" placeholder="Username">
          <div id="usernameFeedback" class="form-text">Invalid. Username has whitespace or special characters.</div>
        </div>
        <div class="mb-4">
          <label for="exampleFormControlInput1" class="form-label">Password</label>
          <input required type="text" class="form-control" id="password-register" placeholder="Password">
          <div id="passwordFeedback" class="form-text">Invalid. Username has whitespace or special characters.</div>
        </div>
        <button disabled type='submit' id='register-button' class="btn btn-success w-100">Register</button>
      </form>
    </div>
    
    <script src="index.js"></script>
    <script src="asset/bootstrap/js/bootstrap.min.js"></script>
  </div>
</body>
</html>
