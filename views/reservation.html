<main>
  <h4 style='text-align: center;' class="mt-4 mb-4">Reservations</h4>
  <div class="incoming-event"></div>
  <div id='appointmentList'>
    
  </div>
</main>

<script>
  function getAllAppointments(){
    $.ajax({
      type: 'get',
      url: 'api/getAllAppointments.php',
      success: function(response){
        $('#appointmentList').html(response)
      }
    })
  }

  function getIncomingEvent(){
    $.ajax({
      type: 'get',
      url: 'api/getIncomingEvent.php',
      success: function(response){
        $('.incoming-event').html(response)
      }
    })
  }

  $(document).ready(function(){
    getAllAppointments();
    getIncomingEvent();
  })

</script>

<style>
  #appointmentList {
    display: flex;
    flex-direction: column;
    width: 100%;
    align-items: center;
    max-height: 75vh;
    overflow: auto;
    padding: 10px;
  }

  .appointment {
    width: 50%;
    max-height: 15vh;
    padding: 1rem 1.5rem;
    border-radius: 8px;
    background-color: #fff;
    display: flex;
    box-shadow: rgba(0, 0, 0, 0.05) 0px 6px 24px 0px, rgba(0, 0, 0, 0.08) 0px 0px 0px 1px;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
  }

  .appointment > div > p {
    font-family: Inter-SemiBold;
  }

  h4 {
    font-family: Inter-Bold;
  }

</style>
