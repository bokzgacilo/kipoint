<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <link rel="icon" type="image/x-icon" href="../asset/seal.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Kipoint</title>
  <link rel="stylesheet" href="../main.css">
  <script src="../jquery.js"></script>
  <script src="../plugins/sweetalert2@11.js"></script>
</head>
<body>
  <style>
    @media only screen and (max-width: 500px){
      .user-login-form-container {
        display: flex;
        flex-direction: column;
        width: 60%;
        align-self: center;
      }

      img {
        align-self: center;
        margin-top: 5rem;
        margin-bottom: 2rem;
        width: 50%;
        height: auto;
        object-fit: cover;
      }
    }

    @media only screen and (min-width: 500px){
      .user-login-form-container {
        display: flex;
        flex-direction: column;
        width: 25vw;
        margin-top: 4rem;
        align-self: center;
      }

      img {
        align-self: center;
        width: 40%;
        height: auto;
        object-fit: cover;
      }
    }
    
    
  </style>
  <div class="container d-flex flex-column justify-content-center">
    <div class="user-login-form-container">
      <img src="../asset/seal.png" class="mb-4">
      <h4 class="is-size-4 mb-4 mt-4">Client Login</h4>
      <form id="userFormLogin">
        <input required id="username" class="mb-3 input" type="text" placeholder="Username">
        <input required id="password" class="mb-3 input" type="password" placeholder="Password">
        <button type='submit' class="mb-4 button is-primary w-100">LOGIN</button>
      </form>
      <button class="mt-4 w-100 button">Forgot Password</button>
      <a href="register.html" class="mt-4 button is-info is-outlined w-100">Register</a>
    </div>
  </div>

  <script>
    $(document).ready(function(){
      $('#userFormLogin').submit((event) => {
        event.preventDefault();

        var username = $('#username').val();
        var password = $('#password').val();

        $.ajax({
          type: 'post',
          url: 'api/login.php',
          data: {
            username: username,
            password: password
          },
          beforeSend: () => {

          },
          success: (response) => {
            if(response == 0){
              Swal.fire(
                'Error',
                'Username is not registered',
                'error'
              )
            }

            if(response == 1){
              Swal.fire({
                title: 'Successfully Logged In',
                icon: 'success',
                confirmButtonColor: '#3085d6',
                cancelButtonColor: '#d33',
                confirmButtonText: 'Open Dashboard'
              }).then((result) => {
                if (result.isConfirmed) {
                  sessionStorage.setItem('username', $("[name='username']").val());
                  window.location.replace("dashboard.html");
                }
              })
            }

            if(response == 2){
              Swal.fire(
                'Incorrect Password',
                'Please make sure caps lock is off.',
                'error'
              )
            }
          }
        })
      })
    })
  </script>
</body>
</html>
