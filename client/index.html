<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <link rel="icon" type="image/x-icon" href="../asset/seal.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Kipoint</title>
  <link rel="stylesheet" href="login-mobile.css">
  <link rel="stylesheet" href="login-web.css">
  <link rel="stylesheet" href="../main.css">
  <script src="../jquery.js"></script>
  <script src="login.js"></script>
  <script src="../plugins/sweetalert2@11.js"></script>
</head>
<body>
  <div class="container d-flex flex-column justify-content-center">
    <div class="user-login-form-container">
      <img src="../asset/seal.png" class="mb-4">
      <h4 class="is-size-4 mb-4 mt-4">Client Login</h4>
      <form id="userFormLogin">
        <input required id="username" class="mb-3 input" type="text" placeholder="Username">
        <input required id="password" class="mb-3 input" type="password" placeholder="Password">
        <button type='submit' class="mb-4 button is-primary w-100">LOGIN</button>
      </form>
      <a href="forgotpassword.html" class="mt-4 w-100 button">Forgot Password</a>
      <a href="register.html" class="mt-4 button is-info is-outlined w-100">Register</a>
    </div>
  </div>
</body>
</html>
