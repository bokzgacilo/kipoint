<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Kipoint</title>
  <link rel="stylesheet" href="../main.css">
  <script src="../jquery.js"></script>
  <script src="../plugins/sweetalert2@11.js"></script>
</head>
<body>
  <style>
    @media only screen and (max-width: 500px){
      .user-login-form-container {
        display: flex;
        flex-direction: column;
        width: 60%;
        align-self: center;
      }

      img {
        align-self: center;
        margin-top: 5rem;
        margin-bottom: 2rem;
        width: 50%;
        height: auto;
        object-fit: cover;
      }
    }
    @media only screen and (min-width: 500px){
      .user-login-form-container {
        display: flex;
        flex-direction: column;
        width: 25%;
        align-self: center;
      }

      img {
        align-self: center;
        margin: 2rem 0;
        width: 50%;
        height: auto;
        object-fit: cover;
      }
    }
    
    
  </style>
  <div class="container d-flex flex-column justify-content-center">
    <div class="user-login-form-container">
      <img src="../asset/seal.png">
      <h4 class="is-size-4">Login</h4>
      <form id="userFormLogin" method='post' enctype="multipart/form-data" class="user-login-form">
        <input required name="username" class="mt-4 mb-3 input is-normal is-small is-hovered" type="text" placeholder="Username">
        <input required name="password" class="mb-3 input is-normal is-small is-hovered" type="password" placeholder="Password">
        <button type='submit' class="mb-4 button is-link w-100 is-small">Login</button>
      </form>
      <button class="mt-4 w-100 button is-small">Forgot Password</button>
      <a href="register.html" class="mt-4 button is-success w-100 is-small">Register</a>
    </div>
  </div>

  <script>
    $(document).ready(function(){
      $('#userFormLogin').submit((event) => {
        event.preventDefault();
        var form = $("#userFormLogin")[0];
        var formdata = new FormData(form);

        $.ajax({
          type: 'post',
          url: 'api/login.php',
          enctype: 'multipart/form-data',
          data: formdata,
          processData: false,
          contentType: false,
          cache: false,
          timeout: 800000,
          beforeSend: () => {

          },
          success: (response) => {
            if(response == 0){
              Swal.fire(
                'Error',
                'Username is not registered',
                'error'
              )
            }

            if(response == 1){
              Swal.fire({
                title: 'Successfully Logged In',
                icon: 'success',
                confirmButtonColor: '#3085d6',
                cancelButtonColor: '#d33',
                confirmButtonText: 'Open Dashboard'
              }).then((result) => {
                if (result.isConfirmed) {
                  sessionStorage.setItem('username', $("[name='username']").val());
                  window.location.replace("dashboard.html");
                }
              })
            }

            if(response == 2){
              Swal.fire(
                'Incorrect Password',
                'Please make sure caps lock is off.',
                'error'
              )
            }
          }
        })
      })
    })
  </script>
</body>
</html>
