<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="../asset/seal.png">
  <title>Forgot Password - Kipoint</title>
  <link rel="stylesheet" href="../main.css">
  <script src="../plugins/sweetalert2@11.js"></script>
  <script src="../jquery.js"></script>
</head>
<body>
  <style>
    .register {
      display: flex;
      flex-direction: column;
      align-self: center;
    }

    img {
      align-self: center;
      margin-top: 4rem;
      width: 50%;
      height: auto;
      object-fit: cover;
    }
    
    #registerForm {
      display: flex;
      flex-direction: row;
    }

    .step {
      flex-direction: column;
      width: 25vw;
      background-color: #fff;
      display: none;
    }

    .step-1 {
      display: flex;
    }

    .step > i {
      background-color: rgb(208, 208, 208);
      width: 40px;
      height: 40px;
      display: flex;
      border-radius: 50px;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      align-self: center;
      cursor: pointer;
      margin-top: 1rem;
      transition: 0.5s;
    }
    .step > i:hover {
      color: #fff;
      background-color: var(--blue-300);
    }
    
  </style>
  <div class="backdrop">
    <span class="loader"></span>
  </div>

  <div class="container d-flex flex-column justify-content-center">
    <div class="register">
      <img src="../asset/seal.png" class="mb-4">
      <div id="registerForm">
        <div class="step step-1">
          <h4 class="is-size-4 mb-4 mt-4">Enter your email</h4>
          <input name="email" class="mb-3 input" type="email" placeholder="juan.delacruz@gmail.com">
          <i name="nextButton" class="fa-solid fa-arrow-right fa"></i>
        </div>
      </div>
    </div>
  </div>

  <script>
    $(document).ready(function(){
      $("[name='nextButton']").click(function(){
        if($("[name='email']").val() == ''){
          alert();
        }else {
          $.ajax({
            type: 'post',
            url: 'api/forgotPassword.php',
            data: {
              email: $("[name='email']").val()
            },
            beforeSend: () => {
              $('.backdrop').css({'display' : 'flex'})
            },
            success: (response) => {
              if(response == 1){
                Swal.fire(
                  'Temporary Password Sent',
                  'A temporary password was sent to your email. Once you successfully login, please update your password.',
                  'success'
                )
              }

              $('.backdrop').css({'display' : 'none'})
            }
          })
          
        } 
      })
    })
  </script>
</body>
</html>
